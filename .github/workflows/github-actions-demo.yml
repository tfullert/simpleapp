name: GitHub Actions Demo

run-name: ${{ github.actor }} deploying and signing simpleapp.exe

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  Explore-GitHub-Actions:
    runs-on: windows-latest

    steps:
      - name: Show workflow context
        shell: pwsh
        run: |
          Write-Host "The job was automatically triggered by a $env:GITHUB_EVENT_NAME event."
          Write-Host "This job is now running on a $env:RUNNER_OS server hosted by GitHub."
          Write-Host "The name of your branch is $env:GITHUB_REF and your repository is $env:GITHUB_REPOSITORY."

      - name: Check out repository code
        uses: actions/checkout@v6

      - name: List files in the repository
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Recurse

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Windows test executable
        shell: cmd
        run: |
          cl simpleapp.c /Fe:simpleapp.exe

      - name: Setup SM_CLIENT_CERT_FILE from base64 secret data
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "sm_client_cert.p12"
          [System.IO.File]::WriteAllBytes(
            $certPath,
            [System.Convert]::FromBase64String("${{ secrets.SM_CLIENT_CERT_FILE_DEV_B64 }}")
          )
          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "SM_CLIENT_CERT_FILE=$certPath"
          
      # =====================================================================================
      # We're using protected (offline) keypairs that require a release window to use.
      # =====================================================================================
      - name: Install STM client tools
        uses: digicert/code-signing-software-trust-action@v1.2.0
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY_DEV }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD_DEV }}

      - name: Confirm SMCTL is available
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY_DEV }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD_DEV }}
        run: |
          smctl --help
          smctl healthcheck

      # =====================================================================================
      # We're using protected (offline) keypairs that require a release window to sign with.
      # =====================================================================================
      - name: Create offline release
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY_DEV }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD_DEV }}
        run: |
          $releaseName = "HS_Project_GHAR_${{ github.run_number }}"
          
          $startTime = Get-Date -Format "dd-MMMM-yyyyTHH:mm"
          Write-Host $startTime

          $endTime = (Get-Date).AddMinutes(15).ToString("dd-MMMM-yyyyTHH:mm")
          Write-Host $endTime
          
          $output = & smctl release create offline $releaseName `
            $startTime `
            $endTime `
            3b7597da-f7fc-42d8-a094-fd8c4b1197c4 `
            --project HS_Project `
            --team-id e75fe41c-b620-4f43-b344-3e91fc1cdb8d `
            --purpose SIGN `
            --maxsignatures 10 `
            --keypair-type STANDARD `
            --release-users ba928ed4-2e3f-42af-9ac0-f2a0893f75f8 `
             2>&1

            $outputText = $output | Out-String
            Write-Host "SMCTL output:"
            Write-Host $outputText

            $releaseIdMatch = [regex]::Match($outputText, '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')

            if (-not $releaseIdMatch.Success) {
              throw "Could not find release ID in smctl release create output."
            }

            $releaseId = $releaseIdMatch.Value

            "RELEASE_ID=$releaseId" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "RELEASE_NAME=$releaseName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

            Write-Host "Created release: $releaseName"
            Write-Host "Release ID: $releaseId"

      # =====================================================================================
      # STM will sign our executable.
      # =====================================================================================
      - name: Sign simpleapp.exe with Software Trust Manager
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY_DEV }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD_DEV }}
        run: |
          smctl sign --keypair-alias HS_ECDSA384_KP --input "${{ github.workspace }}\simpleapp.exe"

      - name: Write STM CA certificates
        shell: pwsh
        run: |
          @"
          ${{ secrets.STM_ROOT_CA_PEM }}
          "@ | Out-File -FilePath stm-root-ca.pem -Encoding ascii

          @"
          ${{ secrets.STM_ICA_CA_PEM }}
          "@ | Out-File -FilePath stm-ica-ca.pem -Encoding ascii

          @"
          ${{ secrets.STM_LEAF_CA_PEM }}
          "@ | Out-File -FilePath stm-leaf-ca.pem -Encoding ascii

          # Trust the root CA
          certutil -addstore -f Root stm-root-ca.pem

          # Add the intermediate CA
          certutil -addstore -f CA stm-ica-ca.pem

      - name: Inspect STM CA PEM files
        shell: pwsh
        run: |
          openssl x509 -in stm-root-ca.pem -noout -subject -issuer -fingerprint -sha256
          openssl x509 -in stm-ica-ca.pem -noout -subject -issuer -fingerprint -sha256
          openssl x509 -in stm-leaf-ca.pem -noout -subject -issuer -fingerprint -sha256

      - name: Verify signed EXE
        shell: pwsh
        run: |
          Get-AuthenticodeSignature -FilePath "${{ github.workspace }}\simpleapp.exe" | Format-List *

      # =====================================================================================
      # Now we can close our release window.
      # =====================================================================================
      - name: Close STM release
        if: always()
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY_DEV }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD_DEV }}
        run: |
          if (-not $env:RELEASE_ID) {
            Write-Host "No RELEASE_ID found. Skipping release close."
            exit 0
          }

          smctl release close $env:RELEASE_ID
          Write-Host "Closed release: $env:RELEASE_ID"
      - name: Show job status
        shell: pwsh
        run: |
          Write-Host "This job's status is ${{ job.status }}."
