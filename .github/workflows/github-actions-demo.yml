name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: 
  push:
    branches:
      - main
permissions:
  contents: write
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VCPKG_FEATURE_FLAGS: dependencygraph
  VCPKG_DEFAULT_TRIPLET: x64-mingw-static
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: Checkout repository code
        uses: actions/checkout@v6
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Set up vcpkg and install dependencies
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
      - name: Build Windows test executable
        run: |
          x86_64-w64-mingw32-gcc simpleapp.c \
            -I"$VCPKG_ROOT/installed/x64-mingw-static/include" \
            -L"$VCPKG_ROOT/installed/x64-mingw-static/lib" \
            -lz \
            -o simpleapp.exe
      - name: Setup SM_CLIENT_CERT_FILE from base64 secret data
        run: |
          export SM_CLIENT_CERT_FILE=${RUNNER_TEMP}/sm_client_cert.p12
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > ${SM_CLIENT_CERT_FILE}
          echo "SM_CLIENT_CERT_FILE=${SM_CLIENT_CERT_FILE}" >> "$GITHUB_ENV"
        shell: bash
      - name: Verify SM client certificate file
        shell: bash
        run: |
          echo "SM_CLIENT_CERT_FILE=$SM_CLIENT_CERT_FILE"
          test -s "$SM_CLIENT_CERT_FILE"
          ls -l "$SM_CLIENT_CERT_FILE"
          openssl pkcs12 \
          -in "$SM_CLIENT_CERT_FILE" \
          -info \
          -noout \
          -passin pass:"${{ secrets.SM_CLIENT_CERT_PASSWORD }}"
      - name: Inspect client auth certificate metadata
        shell: bash
        run: |
          openssl pkcs12 \
          -in "$SM_CLIENT_CERT_FILE" \
          -clcerts \
          -nokeys \
          -passin pass:"${{ secrets.SM_CLIENT_CERT_PASSWORD }}" \
          | openssl x509 -noout -subject -issuer -dates -ext extendedKeyUsage
      - name: Setup Software Trust Manager
        uses: digicert/code-signing-software-trust-action@v1.2.0
        with:
          simple-signing-mode: true
          # If the below 2 parameters are supplied, then smctl executable is invoked to attempt the signing.
          input: simpleapp.exe
          keypair-alias: TYLER_STATIC_KP
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}  
      - run: echo "🍏 This job's status is ${{ job.status }}."
